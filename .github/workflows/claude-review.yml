name: claude-review

# VENDORED from bluesky-social/.github/.github/workflows/claude-review.yml.
#
# atproto is a public repo, and GitHub does not allow public repos to call
# reusable workflows hosted in internal repos (bluesky-social/.github is
# internal), so this repo carries its own copy of the workflow. The role
# ARN comes from the org secret AWS_BEDROCK_REVIEW_ROLE_ARN (visibility:
# all repositories).
#
# When the upstream reusable workflow changes, sync this file manually.
# See bluesky-social/.github/docs/claude-review-setup.md for design notes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  actions: read
  id-token: write

jobs:
  review:
    # Internal PRs only. This repo is public: fork PRs are the bulk of
    # community traffic and MUST NOT trigger reviews (no Bedrock spend on
    # unvetted code, and fork PRs can't mint the OIDC token anyway —
    # belt-and-braces with this explicit guard). Branch PRs can only be
    # created by people with write access, i.e. org members.
    # Bot-authored PRs (dependabot, changesets) are also skipped.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: claude-review-${{ github.repository }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Load prompt
        id: prompt
        env:
          PROMPT_FILE: .github/claude-review-prompt.md
        run: |
          set -euo pipefail
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "::error::prompt-file '$PROMPT_FILE' not found"
            exit 1
          fi
          {
            echo "prompt<<PROMPT_EOF"
            cat "$PROMPT_FILE"
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      # Post (or update) a pinned comment explaining how to give feedback
      # on Claude's reviews.
      - name: Post feedback legend
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          marker='<!-- claude-feedback-legend -->'
          body="$marker

          **How to give feedback on this review**

          - React on any of Claude's comments:
            👍 useful · 👎 noise · 🎉 caught something we'd have missed · 😕 confusing
          - Or reply with \`/feedback good\`, \`/feedback noise\`,
            \`/feedback missed: <note>\`, or \`/feedback confusing: <note>\`
            for finer-grained signal.

          These are harvested periodically to tune Claude's prompt. Silence counts as 👎."
          existing=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -n 1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/$existing" \
              -f body="$body" >/dev/null
            echo "Updated existing feedback legend comment ($existing)"
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" \
              -f body="$body" >/dev/null
            echo "Posted new feedback legend comment"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_REVIEW_ROLE_ARN }}
          aws-region: us-east-2

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          additional_permissions: |
            actions: read
          track_progress: true
          claude_args: |
            --model global.anthropic.claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__download_job_log,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ steps.prompt.outputs.prompt }}
