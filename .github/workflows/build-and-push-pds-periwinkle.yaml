name: build-and-push-pds

on:
  push:
    branches:
      - feat/configurable-actor-key-directory
  workflow_dispatch:

env:
  IMAGE_NAME: periwinkle/pds

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/pds/Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/pds-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pds-image
          path: /tmp/pds-image.tar
          retention-days: 1

  push-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    outputs:
      full_image: ${{ steps.push.outputs.full_image }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pds-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/pds-image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PDS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push
        id: push
        run: |
          SHA=${{ needs.build.outputs.short_sha }}
          FULL_IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${SHA}
          docker tag $(docker images -q | head -1) "${FULL_IMAGE}"
          docker push "${FULL_IMAGE}"
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

  push-prod:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    outputs:
      full_image: ${{ steps.push.outputs.full_image }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pds-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/pds-image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PDS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push
        id: push
        run: |
          SHA=${{ needs.build.outputs.short_sha }}
          FULL_IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${SHA}
          docker tag $(docker images -q | head -1) "${FULL_IMAGE}"
          docker push "${FULL_IMAGE}"
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

  trigger-dev-deploy:
    needs: [build, push-dev]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Start Temporal updateImages workflow (dev)
        run: |
          SHA="${{ needs.build.outputs.short_sha }}"
          WORKFLOW_ID="update-images-dev-${SHA}-$(date +%s)"
          FULL_IMAGE="${{ needs.push-dev.outputs.full_image }}"

          # Encode workflow input as Temporal payload (json/plain encoding)
          INPUT_JSON="{\"region\":\"${{ vars.PDS_REGION }}\",\"clusterName\":\"${{ vars.PDS_CLUSTER_NAME }}\",\"pdsImage\":\"${FULL_IMAGE}\"}"
          ENCODED_DATA=$(echo -n "${INPUT_JSON}" | base64 -w0)

          curl -sf -X POST \
            "https://${TEMPORAL_ADDRESS}/api/v1/namespaces/${TEMPORAL_NAMESPACE}/workflows/${WORKFLOW_ID}" \
            -H "Authorization: Bearer ${TEMPORAL_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"workflowType\": { \"name\": \"updateImages\" },
              \"taskQueue\": { \"name\": \"pds-operations\" },
              \"input\": {
                \"payloads\": [{
                  \"metadata\": { \"encoding\": \"anNvbi9wbGFpbg==\" },
                  \"data\": \"${ENCODED_DATA}\"
                }]
              },
              \"workflowExecutionTimeout\": \"3600s\",
              \"requestId\": \"$(cat /proc/sys/kernel/random/uuid)\"
            }"

          echo "Temporal workflow started: ${WORKFLOW_ID}"
        env:
          TEMPORAL_API_KEY: ${{ secrets.TEMPORAL_API_KEY }}
          TEMPORAL_NAMESPACE: ${{ vars.TEMPORAL_NAMESPACE }}
          TEMPORAL_ADDRESS: ${{ vars.TEMPORAL_ADDRESS }}

  trigger-prod-deploy:
    needs: [build, push-prod]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Start Temporal updateImages workflow (prod)
        run: |
          SHA="${{ needs.build.outputs.short_sha }}"
          WORKFLOW_ID="update-images-prod-${SHA}-$(date +%s)"
          FULL_IMAGE="${{ needs.push-prod.outputs.full_image }}"

          INPUT_JSON="{\"region\":\"${{ vars.PDS_REGION }}\",\"clusterName\":\"${{ vars.PDS_CLUSTER_NAME }}\",\"pdsImage\":\"${FULL_IMAGE}\"}"
          ENCODED_DATA=$(echo -n "${INPUT_JSON}" | base64 -w0)

          curl -sf -X POST \
            "https://${TEMPORAL_ADDRESS}/api/v1/namespaces/${TEMPORAL_NAMESPACE}/workflows/${WORKFLOW_ID}" \
            -H "Authorization: Bearer ${TEMPORAL_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"workflowType\": { \"name\": \"updateImages\" },
              \"taskQueue\": { \"name\": \"pds-operations\" },
              \"input\": {
                \"payloads\": [{
                  \"metadata\": { \"encoding\": \"anNvbi9wbGFpbg==\" },
                  \"data\": \"${ENCODED_DATA}\"
                }]
              },
              \"workflowExecutionTimeout\": \"3600s\",
              \"requestId\": \"$(cat /proc/sys/kernel/random/uuid)\"
            }"

          echo "Temporal workflow started: ${WORKFLOW_ID}"
        env:
          TEMPORAL_API_KEY: ${{ secrets.TEMPORAL_API_KEY }}
          TEMPORAL_NAMESPACE: ${{ vars.TEMPORAL_NAMESPACE }}
          TEMPORAL_ADDRESS: ${{ vars.TEMPORAL_ADDRESS }}

  summary:
    needs: [build, push-dev, push-prod, trigger-dev-deploy, trigger-prod-deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## PDS Fork Image Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ needs.build.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rolling image update triggered via Temporal \`updateImages\` workflow for dev and prod." >> $GITHUB_STEP_SUMMARY
