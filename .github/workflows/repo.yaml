name: Test

on:
  pull_request:
    branches:
      - '*'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # https://github.com/actions/setup-node/issues/531#issuecomment-2960522861
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure Dependency Cache
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - name: Get current month
        run: echo "CURRENT_MONTH=$(date +'%Y-%m')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        name: Cache Puppeteer browser binaries
        with:
          path: ~/.cache
          key: ${{ env.CURRENT_MONTH }}-${{ runner.os }}-${{ runner.arch }}
      - run: pnpm i --frozen-lockfile

      - name: Generate cache key for generated code
        id: codegen-cache-key
        shell: bash
        run: |
          # Hash all lexicon JSON files to detect any translation changes
          LEXICONS_HASH=$(find lexicons -name "*.json" -type f -exec cat {} \; | shasum -a 256 | cut -d' ' -f1);
          # Get @atproto/lex-cli version to bust cache on cli upgrades
          LEX_CLI_VERSION=$(grep '"version"' packages/lex-cli/package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/');
          CACHE_KEY="codegen-${LEXICONS_HASH}-lex-cli-${LEX_CLI_VERSION}";
          echo "key=${CACHE_KEY}" >> $GITHUB_OUTPUT;
          echo "Cache key: ${CACHE_KEY}";

      - name: Restore generated code from cache
        id: codegen-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/api/src/client
            packages/bsky/src/lexicon
            packages/lexicon-resolver/src/client
            packages/ozone/src/lexicon
            packages/pds/src/lexicon
          key: ${{ steps.codegen-cache-key.outputs.key }}

      - name: Perform code generation
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        shell: bash
        run: pnpm run codegen

      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/*/dist
            packages/*/*/dist
            packages/lex/*/src/lexicons
            packages/lex/*/tests/lexicons
            packages/oauth/oauth-client-browser-example/src/lexicons
            packages/oauth/*/src/locales/*/messages.ts
            packages/api/src/moderation/const/labels.ts
            packages/api/src/client
            packages/ozone/src/lexicon
            packages/bsky/src/lexicons
            packages/lexicon-resolver/src/lexicons
            packages/pds/src/lexicons
            packages/sync/src/lexicons
          retention-days: 1
  test:
    name: Test
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1/8, 2/8, 3/8, 4/8, 5/8, 6/8, 7/8, 8/8]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # https://github.com/actions/setup-node/issues/531#issuecomment-2960522861
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure Dependency Cache
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - name: Get current month
        run: echo "CURRENT_MONTH=$(date +'%Y-%m')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        name: Cache Puppeteer browser binaries
        with:
          path: ~/.cache
          key: ${{ env.CURRENT_MONTH }}-${{ runner.os }}-${{ runner.arch }}
      - run: pnpm i --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - run: pnpm test:withFlags --maxWorkers=1 --shard=${{ matrix.shard }} --passWithNoTests
  verify:
    name: Verify
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # https://github.com/actions/setup-node/issues/531#issuecomment-2960522861
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack
        run: corepack enable
      - name: Configure Dependency Cache
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - name: Get current month
        run: echo "CURRENT_MONTH=$(date +'%Y-%m')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        name: Cache Puppeteer browser binaries
        with:
          path: ~/.cache
          key: ${{ env.CURRENT_MONTH }}-${{ runner.os }}-${{ runner.arch }}
      - run: pnpm i --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - run: pnpm verify
