name: Build & Deploy AppView

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
    paths:
      - 'packages/bsky/**'
      - 'packages/bsync/**'
      - 'packages/sync/**'
      - 'packages/identity/**'
      - 'packages/api/**'
      - 'packages/common/**'
      - 'packages/common-web/**'
      - 'packages/crypto/**'
      - 'packages/did/**'
      - 'packages/repo/**'
      - 'packages/syntax/**'
      - 'packages/lexicon/**'
      - 'packages/lexicon-resolver/**'
      - 'packages/xrpc/**'
      - 'packages/xrpc-server/**'
      - 'services/bsky/**'
      - 'services/bsync/**'
      - 'services/dataplane/**'
      - 'lexicons/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - stage
          - prod

env:
  REGISTRY: ghcr.io
  BSKY_IMAGE: ghcr.io/w-social-eu/w-social-atproto/bsky
  BSYNC_IMAGE: ghcr.io/w-social-eu/w-social-atproto/bsync
  DATAPLANE_IMAGE: ghcr.io/w-social-eu/w-social-atproto/dataplane

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      image_tag: ${{ steps.config.outputs.image_tag }}
      kubeconfig_secret: ${{ steps.config.outputs.kubeconfig_secret }}
    steps:
      - name: Determine environment
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            ENV="prod"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV="stage"
          elif [[ "${{ github.ref_name }}" == "develop" || "${{ github.ref_name }}" == feature/* ]]; then
            ENV="dev"
          else
            ENV="dev"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=custom-${ENV}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          case "$ENV" in
            dev)   echo "kubeconfig_secret=KUBECONFIG_DEV" >> $GITHUB_OUTPUT ;;
            stage) echo "kubeconfig_secret=KUBECONFIG_STAGE" >> $GITHUB_OUTPUT ;;
            prod)  echo "kubeconfig_secret=KUBECONFIG_PROD" >> $GITHUB_OUTPUT ;;
          esac

  build-bsky:
    runs-on: ubuntu-latest
    needs: config
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push bsky
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/bsky/Dockerfile
          push: true
          tags: |
            ${{ env.BSKY_IMAGE }}:${{ needs.config.outputs.image_tag }}
            ${{ env.BSKY_IMAGE }}:${{ needs.config.outputs.environment }}-latest
            ${{ github.ref_type == 'tag' && format('{0}:{1}', env.BSKY_IMAGE, github.ref_name) || '' }}
          no-cache: true

  build-bsync:
    runs-on: ubuntu-latest
    needs: config
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push bsync
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/bsync/Dockerfile
          push: true
          tags: |
            ${{ env.BSYNC_IMAGE }}:${{ needs.config.outputs.image_tag }}
            ${{ env.BSYNC_IMAGE }}:${{ needs.config.outputs.environment }}-latest
            ${{ github.ref_type == 'tag' && format('{0}:{1}', env.BSYNC_IMAGE, github.ref_name) || '' }}
          no-cache: true

  build-dataplane:
    runs-on: ubuntu-latest
    needs: config
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push dataplane
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/dataplane/Dockerfile
          push: true
          tags: |
            ${{ env.DATAPLANE_IMAGE }}:${{ needs.config.outputs.image_tag }}
            ${{ env.DATAPLANE_IMAGE }}:${{ needs.config.outputs.environment }}-latest
            ${{ github.ref_type == 'tag' && format('{0}:{1}', env.DATAPLANE_IMAGE, github.ref_name) || '' }}
          no-cache: true

  deploy:
    runs-on: ubuntu-latest
    needs: [config, build-bsky, build-bsync, build-dataplane]
    steps:
      - name: Checkout appview charts
        uses: actions/checkout@v4
        with:
          repository: w-social-eu/w-social-appview
          token: ${{ secrets.PAT_TOKEN }}
          path: appview

      - uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets[needs.config.outputs.kubeconfig_secret] }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy dataplane
        run: |
          ENV="${{ needs.config.outputs.environment }}"
          TAG="${{ needs.config.outputs.image_tag }}"
          helm upgrade --install dataplane appview/helm/charts/dataplane \
            -f appview/helm/charts/dataplane/values.yaml \
            -f appview/helm/charts/dataplane/values-${ENV}.yaml \
            --set image.repository=${{ env.DATAPLANE_IMAGE }} \
            --set image.tag="${TAG}" \
            -n backend \
            --wait --timeout 10m

      - name: Deploy bsync
        run: |
          ENV="${{ needs.config.outputs.environment }}"
          TAG="${{ needs.config.outputs.image_tag }}"
          helm upgrade --install bsync appview/helm/charts/bsync \
            -f appview/helm/charts/bsync/values.yaml \
            -f appview/helm/charts/bsync/values-${ENV}.yaml \
            --set image.repository=${{ env.BSYNC_IMAGE }} \
            --set image.tag="${TAG}" \
            -n backend \
            --wait --timeout 5m

      - name: Deploy bsky
        run: |
          ENV="${{ needs.config.outputs.environment }}"
          TAG="${{ needs.config.outputs.image_tag }}"
          helm upgrade --install bsky appview/helm/charts/bsky \
            -f appview/helm/charts/bsky/values.yaml \
            -f appview/helm/charts/bsky/values-${ENV}.yaml \
            --set image.repository=${{ env.BSKY_IMAGE }} \
            --set image.tag="${TAG}" \
            -n backend \
            --wait --timeout 5m

      - name: Summary
        if: always()
        run: |
          echo "## AppView Build & Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| bsky | \`${{ env.BSKY_IMAGE }}:${{ needs.config.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| bsync | \`${{ env.BSYNC_IMAGE }}:${{ needs.config.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| dataplane | \`${{ env.DATAPLANE_IMAGE }}:${{ needs.config.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ needs.config.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
