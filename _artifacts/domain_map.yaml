  - name: 'data handling'
    slug: 'data-handling'
    description: >-
      Working with AT Protocol data types, validation, encoding, and the
      generated schema utilities that enforce correctness at compile and
      runtime.

  - name: 'network communication'
    slug: 'network-communication'
    description: >-
      Making XRPC requests, managing authenticated sessions, and performing
      record CRUD operations against AT Protocol services.

  - name: 'composition and extension'
    slug: 'composition-extension'
    description: >-
      Building higher-level APIs from low-level primitives using Actions,
      composing Clients, and integrating with server-side infrastructure.

skills:
  - name: 'Lexicon Management'
    slug: 'lexicon-management'
    domain: 'schema-management'
    description: >-
      Installing, updating, and managing Lexicon schemas from the AT network
      using the lex CLI, including manifest tracking and CI verification.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-installer'
      - '@atproto/lex-resolver'
    covers:
      - 'lex install command'
      - 'lexicons.json manifest'
      - 'lex install --update'
      - 'lex install --ci'
      - '--manifest, --lexicons, --no-save flags'
      - 'dependency resolution (recursive NSID refs)'
      - 'CID verification'
    tasks:
      - 'Install specific Lexicon schemas by NSID'
      - 'Restore all Lexicons from an existing manifest'
      - 'Update installed Lexicons to latest versions'
      - 'Verify manifest integrity in CI pipelines'
      - 'Commit lexicons.json and lexicons/ to version control'
    failure_modes:
      - mistake: 'Forgetting to commit lexicons.json manifest'
        mechanism: >-
          Running lex install locally without committing the manifest means
          CI and other developers cannot reproduce the exact same Lexicon
          versions, leading to CID mismatches.
        wrong_pattern: |
          lex install app.bsky.feed.post
          git add lexicons/
          git commit -m "Add lexicons"
        correct_pattern: |
          lex install app.bsky.feed.post
          git add lexicons.json lexicons/
          git commit -m "Install Lexicons"
        source: 'README Quick Start section'
        priority: HIGH
        status: active
      - mistake: 'Using lex install --ci without saving first'
        mechanism: >-
          The --ci flag verifies installed Lexicons match the manifest CIDs.
          If the manifest was never saved (--save or default), --ci will fail
          because there are no CIDs to verify against.
        wrong_pattern: |
          lex install --no-save app.bsky.feed.post
          # In CI:
          lex install --ci  # Fails: manifest has no resolutions
        correct_pattern: |
          lex install app.bsky.feed.post  # save is default
          # In CI:
          lex install --ci
        source: 'lex-installer/src/index.ts:118'
        priority: MEDIUM
        status: active
      - mistake: 'Not understanding recursive dependency resolution'
        mechanism: >-
          lex install automatically resolves and installs all NSID references
          found in the installed Lexicon definitions. Developers may not
          realize that installing one Lexicon can pull in many dependencies.
        source: 'lex-installer/src/lex-installer.ts:241-259'
        priority: MEDIUM
        status: active

  - name: 'Schema Code Generation'
    slug: 'schema-codegen'
    domain: 'schema-management'
    description: >-
      Generating TypeScript schemas from Lexicon JSON files using lex build,
      configuring output options, and integrating into build workflows.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-builder'
    covers:
      - 'lex build command'
      - '--out, --lexicons, --clear, --override flags'
      - '--pure-annotations for library tree-shaking'
      - '--importExt, --fileExt flags'
      - '--include, --exclude patterns'
      - '--lib flag for custom schema imports'
      - '--allowLegacyBlobs flag'
      - '--indexFile flag'
      - 'Workflow integration (prebuild scripts)'
    tasks:
      - 'Generate TypeScript schemas from installed Lexicons'
      - 'Configure build for library distribution with tree-shaking'
      - 'Integrate lex build into package.json scripts'
      - 'Filter which Lexicons to include/exclude in generation'
      - 'Set up prebuild and postinstall scripts'
    failure_modes:
      - mistake: 'Missing prebuild script for codegen'
        mechanism: >-
          Generated TypeScript files are not committed to version control.
          Without a prebuild script, the build will fail because the generated
          files don't exist.
        wrong_pattern: |
          {
            "scripts": {
              "build": "tsc"
            }
          }
        correct_pattern: |
          {
            "scripts": {
              "postinstall": "lex install --ci",
              "prebuild": "lex build",
              "build": "tsc"
            }
          }
        source: 'README Workflow Integration section'
        priority: HIGH
        status: active
      - mistake: 'Not using --pure-annotations for libraries'
        mechanism: >-
          Without --pure-annotations, bundlers cannot tree-shake the generated
          code when it is imported by consumers of the library.
        wrong_pattern: |
          lex build --out ./src/lexicons
        correct_pattern: |
          lex build --out ./src/lexicons --pure-annotations
        source: 'README Tree-Shaking section'
        priority: MEDIUM
        status: active
      - mistake: 'Using --indexFile with .index TLD namespace'
        mechanism: >-
          The --indexFile flag cannot be used if any namespace has a ".index"
          top-level domain, as it would conflict with the generated index file.
          The builder throws an error.
        source: 'lex-builder/src/lex-builder.ts:187'
        priority: MEDIUM
        status: active

  - name: 'Data Validation'
    slug: 'data-validation'
    domain: 'data-handling'
    description: >-
      Using generated schema utilities ($build, $validate, $parse, $check,
      $safeParse, $isTypeOf) and the l namespace for runtime type safety.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-schema'
    covers:
      - '$build() - build data with defaults'
      - '$validate() - strict validation without coercion'
      - '$parse() - parse with defaults and coercion'
      - '$safeParse() - parse returning Result'
      - '$check() - type guard'
      - '$isTypeOf() - $type discriminator'
      - 'l namespace for imperative schema building'
      - 'LexValidationError'
      - 'String format validators (datetime, handle, did, nsid, etc.)'
    tasks:
      - 'Validate data against a Lexicon schema'
      - 'Build type-safe data using $build'
      - 'Parse untrusted input with $parse or $safeParse'
      - 'Discriminate union types with $isTypeOf'
      - 'Extract TypeScript types from schemas'
      - 'Define custom schemas with the l namespace'
    reference_candidates:
      - topic: 'l namespace schema builders'
        reason: '>30 distinct schema builder methods with signatures and options'
      - topic: 'string format validators'
        reason: '11 distinct formats (at-identifier, at-uri, cid, datetime, did, handle, language, nsid, record-key, tid, uri)'
    failure_modes:
      - mistake: 'Confusing $validate with $parse'
        mechanism: >-
          $validate rejects data that needs coercion or defaults. $parse
          applies defaults and coercion. Using $validate on user input that
          needs defaults applied will fail. Using $parse on data you expect
          to already be valid may silently mutate it.
        wrong_pattern: |
          // User input missing optional fields with defaults
          const result = schema.$validate(userInput)  // Throws!
        correct_pattern: |
          // Use $parse for untrusted input (applies defaults/coercion)
          const result = schema.$parse(userInput)
          // Use $validate for data that should already be valid
          const checked = schema.$validate(existingRecord)
        source: 'lex-schema/src/schema.ts:262-265, README $parse/$validate sections'
        priority: CRITICAL
        status: active
      - mistake: 'Using $check when $isTypeOf is needed'
        mechanism: >-
          $check performs full validation (expensive). $isTypeOf only checks
          the $type discriminator property (O(1)). Using $check in hot paths
          when you only need type discrimination wastes CPU.
        wrong_pattern: |
          // In a loop over many records
          if (app.bsky.feed.post.$check(record)) { ... }
        correct_pattern: |
          // Fast $type-only discrimination
          if (app.bsky.feed.post.$isTypeOf(record)) { ... }
        source: 'README $isTypeOf section'
        priority: HIGH
        status: active
      - mistake: 'Omitting $type in $validate but not $build'
        mechanism: >-
          $build auto-injects $type. $validate and $parse require $type to be
          present in the input data for typed objects. Forgetting $type when
          calling $validate causes validation failure.
        wrong_pattern: |
          app.bsky.feed.post.$validate({
            text: 'Hello!',
            createdAt: l.toDatetimeString(new Date()),
          })  // Fails: missing $type
        correct_pattern: |
          app.bsky.feed.post.$validate({
            $type: 'app.bsky.feed.post',
            text: 'Hello!',
            createdAt: l.toDatetimeString(new Date()),
          })
        source: 'lex-schema/src/typed-object.ts:65-70'
        priority: HIGH
        status: active
      - mistake: 'Using open union when closed is needed'
        mechanism: >-
          Open typed unions accept unknown $type values with any shape. Closed
          unions reject them. Using an open union when you need strict type
          checking lets invalid data through silently.
        source: 'lex-schema/src/typed-union.ts:82-88'
        priority: MEDIUM
        status: active
      - mistake: 'Expecting floats to pass integer validation'
        mechanism: >-
          The integer schema uses Number.isSafeInteger() which rejects all
          floating-point numbers, even 1.0. Agents may pass floats where
          integers are required.
        wrong_pattern: |
          schema.$parse({ count: 3.14 })  // Fails: not an integer
        correct_pattern: |
          schema.$parse({ count: Math.floor(3.14) })
        source: 'lex-schema/src/concrete/integer.ts, lex-data/src/lex.ts:148'
        priority: MEDIUM
        status: active

  - name: 'XRPC Requests'
    slug: 'xrpc-requests'
    domain: 'network-communication'
    description: >-
      Making simple XRPC HTTP requests using xrpc() and xrpcSafe() without
      an authenticated Client, including parameter handling and error types.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-client'
    covers:
      - 'xrpc() function (throws on failure)'
      - 'xrpcSafe() function (returns Result)'
      - 'XrpcResponse type'
      - 'XrpcFailure union (XrpcResponseError, XrpcUpstreamError, XrpcInternalError)'
      - 'XrpcFetchError for network failures'
      - 'shouldRetry() method'
      - 'matchesSchemaErrors() method'
      - 'validateRequest / validateResponse options'
    tasks:
      - 'Make an unauthenticated XRPC query'
      - 'Make an XRPC procedure call with body'
      - 'Handle XRPC errors with xrpcSafe'
      - 'Implement retry logic using shouldRetry()'
      - 'Check for specific schema-defined error codes'
    failure_modes:
      - mistake: 'Using xrpc() without error handling'
        mechanism: >-
          xrpc() throws on any failure (network, HTTP error, validation).
          Agents may forget try/catch, leading to unhandled promise rejections.
          xrpcSafe() returns errors as values instead.
        wrong_pattern: |
          const response = await xrpc(service, method, { params })
          // If this fails, unhandled rejection
        correct_pattern: |
          const result = await xrpcSafe(service, method, { params })
          if (result.success) {
            console.log(result.body)
          } else {
            console.error(result.error, result.message)
          }
        source: 'README Error Handling section'
        priority: HIGH
        status: active
      - mistake: 'Not using AbortSignal for timeouts'
        mechanism: >-
          XRPC requests have no default timeout. Without passing signal:
          AbortSignal.timeout(), requests can hang indefinitely.
        wrong_pattern: |
          await xrpc(service, method, { params })
        correct_pattern: |
          await xrpc(service, method, {
            params,
            signal: AbortSignal.timeout(5000),
          })
        source: 'README xrpcSafe example'
        priority: HIGH
        status: active
      - mistake: 'Passing body with query methods'
        mechanism: >-
          XRPC queries are GET requests. Passing a body, content-type, or
          content-length header with a query causes a 400 InvalidRequest error
          on the server side.
        source: 'lex-server/src/lex-router.ts:1089-1098'
        priority: MEDIUM
        status: active
      - mistake: 'Ignoring shouldRetry() for transient errors'
        mechanism: >-
          XrpcFailure provides shouldRetry() which checks for retryable HTTP
          status codes (408, 425, 429, 500, 502, 503, 504, 522, 524) and
          network errors. Not using it leads to poor retry strategies.
        source: 'lex-client/src/errors.ts:39-41'
        priority: MEDIUM
        status: active

  - name: 'Client API'
    slug: 'client-api'
    domain: 'network-communication'
    description: >-
      Setting up and using the Client class for authenticated XRPC, CRUD
      record operations, labeler configuration, service proxying, and
      error handling.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-client'
      - '@atproto/lex-password-session'
    covers:
      - 'Client class (authenticated and unauthenticated)'
      - 'client.create(), get(), put(), delete(), list()'
      - 'client.call() for queries, procedures, and actions'
      - 'client.xrpc() and client.xrpcSafe()'
      - 'client.assertAuthenticated()'
      - 'client.did and client.assertDid'
      - 'Labeler configuration (setLabelers, addLabelers, clearLabelers)'
      - 'Client.configure() for global labelers'
      - 'Service proxy configuration'
      - 'Creating child Clients from parent Clients'
      - 'OAuth and password authentication'
    tasks:
      - 'Create an authenticated Client with OAuth'
      - 'Create an authenticated Client with password session'
      - 'Create a new post record'
      - 'List records with pagination'
      - 'Update a profile with optimistic concurrency'
      - 'Configure content labelers'
      - 'Set up service proxying'
      - 'Handle XRPC errors from Client methods'
    failure_modes:
      - mistake: 'Using new Date().toISOString() for createdAt'
        mechanism: >-
          Date.toISOString() is not guaranteed to produce a valid AT Protocol
          datetime for edge cases (years <10 or >9999). Use
          l.toDatetimeString(new Date()) or l.currentDatetimeString() instead.
        wrong_pattern: |
          await client.create(app.bsky.feed.post, {
            text: 'Hello!',
            createdAt: new Date().toISOString(),
          })
        correct_pattern: |
          await client.create(app.bsky.feed.post, {
            text: 'Hello!',
            createdAt: l.toDatetimeString(new Date()),
          })
        source: 'README Datetime Strings section'
        priority: CRITICAL
        status: active
        skills: ['client-api', 'data-model']
      - mistake: 'Missing rkey for non-literal record keys'
        mechanism: >-
          Records with literal keys (e.g., profile "self") don't need rkey.
          Records with dynamic keys (e.g., posts with TID keys) require rkey
          for get/put/delete. Omitting it throws TypeError.
        wrong_pattern: |
          await client.get(app.bsky.feed.post)  // Throws: rkey required
        correct_pattern: |
          await client.get(app.bsky.feed.post, { rkey: '3jxf7z2k3q2' })
        source: 'lex-client/src/client.ts:955-957'
        priority: HIGH
        status: active
      - mistake: 'Not using swapRecord for concurrent updates'
        mechanism: >-
          client.put() without swapRecord has no concurrency protection. If
          another client updates the record between read and write, data is
          silently overwritten. Use swapRecord with the CID from getRecord.
        wrong_pattern: |
          const profile = await client.get(app.bsky.actor.profile)
          await client.put(app.bsky.actor.profile, { ...profile, displayName: 'New' })
        correct_pattern: |
          const res = await client.xrpc(com.atproto.repo.getRecord, {
            params: { repo: client.assertDid, collection: 'app.bsky.actor.profile', rkey: 'self' }
          })
          await client.put(app.bsky.actor.profile, updated, {
            swapRecord: res.body.cid ?? null,
          })
        source: 'README Updating Profile with Retry Logic section'
        priority: HIGH
        status: active
      - mistake: 'Calling Client methods without authentication'
        mechanism: >-
          create/put/delete/list require an authenticated session. Calling
          them on an unauthenticated Client throws "Client is not authenticated".
          Always call client.assertAuthenticated() first or check client.did.
        source: 'lex-client/src/client.ts:355'
        priority: HIGH
        status: active
      - mistake: 'ReadableStream body prevents retry on 401'
        mechanism: >-
          PasswordSession cannot retry requests with ReadableStream bodies
          after token refresh because the stream is already consumed. The
          original (failed) response is returned instead. Use Uint8Array
          or string bodies when auth refresh may be needed.
        source: 'lex-password-session/src/password-session.ts:277-283'
        priority: MEDIUM
        status: active
      - mistake: 'Not configuring labelers for content moderation'
        mechanism: >-
          Without configuring labelers, the Client sends no labeler DIDs in
          request headers. The server won't apply content labels to responses,
          and moderation features won't work.
        source: 'README Labeler Configuration section'
        priority: MEDIUM
        status: active

  - name: 'Data Model'
    slug: 'data-model'
    domain: 'data-handling'
    description: >-
      Working with the AT Protocol data model types (LexValue, Cid, BlobRef,
      bytes), JSON encoding/decoding, datetime utilities, and string length
      measurement.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-data'
      - '@atproto/lex-json'
      - '@atproto/lex-cbor'
    covers:
      - 'LexValue, LexMap, LexScalar, TypedLexMap types'
      - 'Cid (content identifiers) - parseCid, ifCid, isCid'
      - 'BlobRef - structure, isBlobRef, legacy blob refs'
      - 'JSON encoding - lexParse, lexStringify, jsonToLex, lexToJson'
      - 'CBOR encoding - encode, decode from @atproto/lex-cbor'
      - 'DatetimeString utilities'
      - 'graphemeLen, utf8Len string measurement'
      - 'isLanguageString (BCP-47)'
      - 'lexEquals for deep equality'
    tasks:
      - 'Parse JSON containing CIDs and bytes into data model'
      - 'Serialize data model values to JSON'
      - 'Work with CID objects (parse, compare)'
      - 'Handle BlobRef objects in records'
      - 'Convert dates to valid DatetimeString'
      - 'Measure string length in graphemes vs UTF-8 bytes'
    failure_modes:
      - mistake: 'Using JSON.parse instead of lexParse'
        mechanism: >-
          Standard JSON.parse does not convert $link objects to CID instances
          or $bytes objects to Uint8Array. Data will remain as plain objects,
          failing type guards and schema validation.
        wrong_pattern: |
          const data = JSON.parse(jsonString)
          // data.ref is { $link: "bafyrei..." } - not a Cid!
        correct_pattern: |
          const data = lexParse(jsonString)
          // data.ref is a proper Cid instance
        source: 'README JSON Encoding section'
        priority: CRITICAL
        status: active
      - mistake: 'Using string length instead of graphemeLen'
        mechanism: >-
          Lexicon string constraints use grapheme length, not string length.
          JavaScript str.length counts UTF-16 code units (e.g., emoji family
          is 11 code units but 1 grapheme). Using str.length will give wrong
          counts.
        wrong_pattern: |
          if (text.length > 300) { /* too long */ }
        correct_pattern: |
          import { graphemeLen } from '@atproto/lex'
          if (graphemeLen(text) > 300) { /* too long */ }
        source: 'README Utilities section, lex-data/src/utf8-grapheme-len.ts'
        priority: CRITICAL
        status: active
        skills: ['data-model', 'data-validation']
      - mistake: 'Constructing BlobRef without proper structure'
        mechanism: >-
          BlobRef must have exactly $type:'blob', ref (Cid), mimeType (with /),
          and size (non-negative safe integer). Extra or missing properties
          cause isBlobRef to return false.
        wrong_pattern: |
          const blob = { ref: cidString, mimeType: 'image/png', size: 123 }
        correct_pattern: |
          const blob = {
            $type: 'blob',
            ref: parseCid('bafyrei...'),
            mimeType: 'image/png',
            size: 123,
          }
        source: 'lex-data/src/blob.ts:103-146'
        priority: HIGH
        status: active
      - mistake: 'Not handling legacy blob refs in old records'
        mechanism: >-
          Pre-2023 records may use { ref: string, mimeType: string } format
          without $type. Enable --allowLegacyBlobs when generating schemas
          to handle these. Use isLegacyBlobRef() to detect them.
        source: 'README Blob references NOTE section'
        priority: MEDIUM
        status: active
      - mistake: 'Comparing CIDs with === instead of .equals()'
        mechanism: >-
          CID instances are objects. === compares references, not values.
          Two CIDs with the same hash are !== if they are different instances.
          Use cid.equals(other) or lexEquals() for deep comparison.
        wrong_pattern: |
          if (cid1 === cid2) { /* Never true for different instances */ }
        correct_pattern: |
          if (cid1.equals(cid2)) { /* Correct value comparison */ }
        source: 'lex-data/src/lex-equals.ts:83-84'
        priority: HIGH
        status: active

  - name: 'Actions Composition'
    slug: 'actions-composition'
    domain: 'composition-extension'
    description: >-
      Building composable Action functions that combine multiple XRPC calls
      into higher-level operations, and packaging them as library-style APIs.
    type: core
    packages:
      - '@atproto/lex'
      - '@atproto/lex-client'
    covers:
      - 'Action<Input, Output> type signature'
      - 'client.call() with custom Actions'
      - 'Composing Actions from other Actions'
      - 'Higher-order Actions'
      - 'Retry patterns with optimistic concurrency'
      - 'Packaging Actions as a library'
    tasks:
      - 'Define a custom Action combining multiple XRPC calls'
      - 'Compose higher-order Actions from simpler ones'
      - 'Implement retry logic for concurrent modifications'
      - 'Package Actions as an exportable library'
      - 'Use Actions via client.call()'
    failure_modes:
      - mistake: 'Not calling assertAuthenticated in Actions'
        mechanism: >-
          Actions receive a Client that may be unauthenticated. If the Action
          makes calls requiring auth without checking, errors are cryptic.
          Always call client.assertAuthenticated() at the start.
        wrong_pattern: |
          const myAction: Action<Input, Output> = async (client, input, options) => {
            return client.create(schema, input, options)  // May fail
          }
        correct_pattern: |
          const myAction: Action<Input, Output> = async (client, input, options) => {
            client.assertAuthenticated()
            return client.create(schema, input, options)
          }
        source: 'README Best Practices for Actions section'
        priority: HIGH
        status: active
      - mistake: 'Not forwarding options/signal to sub-calls'
        mechanism: >-
          Actions receive CallOptions including AbortSignal. Not forwarding
          options to inner xrpc/client calls means abort signals are ignored
          and custom headers/labelers are lost.
        wrong_pattern: |
          const myAction: Action<Input, Output> = async (client, input, options) => {
            const data = await client.call(someQuery)  // options not forwarded!
            return client.create(schema, data, {})
          }
        correct_pattern: |
          const myAction: Action<Input, Output> = async (client, input, options) => {
            const data = await client.call(someQuery, undefined, options)
            return client.create(schema, data, options)
          }
        source: 'README Best Practices for Actions section'
        priority: HIGH
        status: active
      - mistake: 'Bundling Actions in a class instead of exports'
        mechanism: >-
          Exporting Actions individually allows tree-shaking. Bundling them
          in a class prevents dead-code elimination. This matters for library
          authors building Action packages.
        wrong_pattern: |
          export class BskyActions {
            async post(client: Client, input: PostInput) { ... }
            async like(client: Client, input: LikeInput) { ... }
          }
        correct_pattern: |
          export const post: Action<PostInput, PostOutput> = async (client, input, options) => { ... }
          export const like: Action<LikeInput, LikeOutput> = async (client, input, options) => { ... }
        source: 'README Best Practices for Actions section'
        priority: MEDIUM
        status: active

  - name: 'Server Setup'
    slug: 'server-setup'
    domain: 'composition-extension'
    description: >-
      Building AT Protocol servers with @atproto/lex-server, including
      type-safe XRPC routing, request validation, authentication, and
      WebSocket subscription handling.
    type: core
    packages:
      - '@atproto/lex-server'
    covers:
      - 'LexRouter for XRPC method registration'
      - 'Type-safe request/response validation'
      - 'Service authentication (JWT Bearer)'
      - 'WebSocket subscription handling'
      - 'LexServerError and LexServerAuthError'
      - 'Node.js HTTP adapter'
      - 'onHandlerError and onSocketError hooks'
    tasks:
      - 'Register XRPC query and procedure handlers'
      - 'Handle WebSocket subscription connections'
      - 'Implement service authentication with JWT'
      - 'Handle and format XRPC errors'
      - 'Integrate with Node.js HTTP server'
    failure_modes:
      - mistake: 'Not providing upgradeWebSocket for subscriptions'
        mechanism: >-
          WebSocket subscription handling requires an upgradeWebSocket function
          in non-Deno environments. Without it, subscription requests throw
          TypeError at runtime.
        source: 'lex-server/src/lex-router.ts:784-788'
        priority: HIGH
        status: active
      - mistake: 'Registering duplicate XRPC methods'
        mechanism: >-
          Registering the same NSID method twice on a LexRouter throws
          TypeError. Method registration must be unique per NSID.
        source: 'lex-server/src/lex-router.ts:673-675'
        priority: MEDIUM
        status: active
      - mistake: 'Not handling iterator cleanup errors'
        mechanism: >-
          WebSocket subscription iterator.return() errors are unhandled unless
          an onSocketError hook is provided. This can cause process crashes
          on cleanup failures.
        source: 'lex-server/src/lex-router.ts:851-864'
        priority: HIGH
        status: active
      - mistake: 'Accepting JWT with alg:none or typ:at+jwt'
        mechanism: >-
          The service auth validator explicitly rejects alg:'none' (security),
          typ:'at+jwt' (OAuth tokens), typ:'refresh+jwt' (refresh tokens),
          and typ:'dpop+jwt' (DPoP proofs). These are intentional security
          boundaries.
        source: 'lex-server/src/service-auth.ts:379-395'
        priority: CRITICAL
        status: active

tensions:
  - name: 'Validation strictness vs. ease of use'
    skills: ['data-validation', 'client-api']
    description: >-
      $validate is strict (rejects data needing defaults/coercion) while
      $parse is lenient (applies transforms). Choosing the wrong one leads
      to either false rejections or silent mutations.
    implication: >-
      An agent optimizing for correctness uses $validate everywhere, breaking
      on valid user input that needs defaults. An agent optimizing for
      convenience uses $parse everywhere, silently mutating data.

  - name: 'Type safety vs. runtime performance'
    skills: ['data-validation', 'xrpc-requests']
    description: >-
      validateResponse defaults to true (safe) but adds overhead. validateRequest
      defaults to false. Full validation on every call is expensive for hot paths.
    implication: >-
      An agent may enable both validateRequest and validateResponse on every
      call for maximum safety, degrading performance. Or disable both for speed,
      missing malformed data.

  - name: 'Simple xrpc() vs. Client abstraction'
    skills: ['xrpc-requests', 'client-api']
    description: >-
      xrpc() is stateless and simple. Client wraps state (auth, labelers,
      headers). Developers building quick scripts may over-engineer with
      Client, while those building apps may under-engineer with raw xrpc().
    implication: >-
      An agent may default to Client for a simple one-off script (unnecessary
      complexity), or use xrpc() for an app that needs auth (missing session
      management).

  - name: 'Library tree-shaking vs. developer convenience'
    skills: ['schema-codegen', 'actions-composition']
    description: >-
      Tree-shaking requires individual exports and --pure-annotations. Class-based
      APIs are more convenient but prevent tree-shaking. Actions must be
      individually exported functions, not class methods.
    implication: >-
      An agent building a library wraps Actions in a class for a clean API,
      making the entire library non-tree-shakeable for consumers.

cross_references:
  - from: 'lexicon-management'
    to: 'schema-codegen'
    reason: >-
      lex install must run before lex build. The output of install (lexicons/)
      is the input to build. Developers must understand both to set up a project.

  - from: 'data-validation'
    to: 'data-model'
    reason: >-
      Schema validation methods operate on data model types (LexValue, Cid,
      BlobRef). Understanding the data model is necessary to understand
      validation behavior (e.g., why CID strings need parsing).

  - from: 'xrpc-requests'
    to: 'client-api'
    reason: >-
      Client.xrpc() delegates to the xrpc() function. Understanding xrpc()
      error types and options helps when using Client methods. Client adds
      auth/labeler headers on top.

  - from: 'client-api'
    to: 'actions-composition'
    reason: >-
      Actions are invoked via client.call(). Understanding Client lifecycle,
      authentication, and options is necessary to write correct Actions.

  - from: 'data-model'
    to: 'client-api'
    reason: >-
      Client CRUD methods accept and return data model types. DatetimeString,
      BlobRef, and CID handling is essential for creating valid records.

  - from: 'schema-codegen'
    to: 'data-validation'
    reason: >-
      lex build generates the schema objects that provide validation methods.
      Build options (--allowLegacyBlobs) affect validation behavior.

  - from: 'data-validation'
    to: 'server-setup'
    reason: >-
      Server-side request validation uses the same schema system. Understanding
      validation modes helps implement correct server handlers.

