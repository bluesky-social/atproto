library:
  name: '@atproto/lex'
  version: '0.0.20'
  repository: 'https://github.com/bluesky-social/atproto'
  description: >-
    Type-safe Lexicon tooling for the AT Protocol. Provides CLI commands to
    install and build Lexicon schemas, generates TypeScript validators and
    builders, offers a typed XRPC client, and an authenticated Client API for
    record management.
  primary_framework: 'framework-agnostic'

domains:
  - name: 'schema management'
